<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polyomino Puzzle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <h1>Polyomino Puzzle</h1>
    <div id="main">
      <div id="grid-section">
        <div id="grid-container">
          <canvas id="game-canvas"></canvas>
          <div id="grid"></div>
        </div>
      </div>
      <div id="sidebar">
        <div id="piece-tray">
          <h2>Pieces</h2>
          <div id="hand"></div>
          <div id="controls">
            <button id="btn-rotate-ccw" title="Rotate CCW (Z)">↺ Z</button>
            <button id="btn-rotate-cw" title="Rotate CW (X)">↻ X</button>
          </div>
          <div id="key-hint">Z / X to rotate</div>
        </div>
      </div>
    </div>
    <div id="status"></div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
