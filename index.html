<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetromino Puzzle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <h1>Tetromino Puzzle</h1>
    <div id="mode-picker">
      <button class="mode-btn selected" data-mode="easy">Easy (4×4)</button>
      <button class="mode-btn" data-mode="medium">Medium (6×6)</button>
      <button class="mode-btn" data-mode="hard">Hard (8×8)</button>
    </div>
    <div id="main">
      <div id="grid-section">
        <div id="grid-container">
          <canvas id="game-canvas"></canvas>
          <div id="grid"></div>
        </div>
      </div>
      <div id="sidebar">
        <div id="piece-tray">
          <h2>Pieces</h2>
          <div id="hand"></div>
          <div id="controls">
            <button id="btn-rotate-ccw" title="Rotate CCW (Z)">↺ Z</button>
            <button id="btn-rotate-cw" title="Rotate CW (X)">↻ X</button>
            <button id="btn-solution">Show solution</button>
          </div>
        </div>
      </div>
    </div>
    <div id="status"></div>
    <button id="btn-new-puzzle" style="display:none">New puzzle</button>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
